<svg width="400" height="160" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-premium" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f8e4a5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g transform="translate(10, 10)">
    <!-- MDS Reconstruído com fidelidade total -->
    <!-- M em Azul Marinho -->
    <path d="M20 90 L20 15 L60 55 L100 15 L100 90" fill="none" stroke="#0d2137" stroke-width="16" stroke-linejoin="round" />
    
    <!-- D em Dourado Premium -->
    <path d="M125 90 L125 15 C185 15, 215 45, 215 52.5 C215 60, 185 90, 125 90 Z" fill="none" stroke="url(#gold-premium)" stroke-width="16" stroke-linejoin="round" />
    
    <!-- S em Azul Marinho -->
    <path d="M240 80 C240 95, 310 95, 310 75 C310 60, 240 60, 240 40 C240 20, 310 20, 310 35" fill="none" stroke="#0d2137" stroke-width="16" stroke-linejoin="round" />
    
    <!-- Ícone da Casinha (Original) -->
    <g transform="translate(12, 72)">
      <path d="M0 20 L20 0 L40 20" fill="none" stroke="#c9a84c" stroke-width="3.5" stroke-linejoin="round" />
      <path d="M8 20 L8 10 L12 10 L12 14" fill="none" stroke="#c9a84c" stroke-width="2.5" />
      <rect x="16" y="12" width="8" height="8" fill="#c9a84c" />
    </g>

    <!-- Linha Divisória em Azul (conforme pedido) -->
    <line x1="10" y1="110" x2="330" y2="110" stroke="#0d2137" stroke-width="1.2" opacity="0.8" />
    
    <!-- CRÉDITO IMOBILIÁRIO em Azul Marinho (sem traço dourado) -->
    <text x="170" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="20" fill="#0d2137" letter-spacing="8">CRÉDITO IMOBILIÁRIO</text>
  </g>
</svg>
